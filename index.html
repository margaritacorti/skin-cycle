<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#D4A8B8">
    <title>SkinCycle - Tu Rutina IA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: url('bg-flowers.jpg') center/cover no-repeat fixed;
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        :root {
            --primary-green: rgba(110, 220, 160, 0.2);
            --primary-green-border: rgba(110, 220, 160, 0.4);
            --primary-green-dark: rgba(110, 220, 160, 0.5);
            --secondary-blue: rgba(120, 170, 255, 0.2);
            --secondary-blue-border: rgba(120, 170, 255, 0.4);
            --secondary-blue-dark: rgba(120, 170, 255, 0.55);
            --neutral-dark: rgba(255, 255, 255, 0.1);
            --neutral-medium: rgba(255, 255, 255, 0.15);
            --neutral-light: rgba(255, 255, 255, 0.2);
            --text-primary: rgba(255, 255, 255, 0.98);
            --text-secondary: rgba(255, 255, 255, 0.9);
            --text-tertiary: rgba(255, 255, 255, 0.75);
            --text-muted: rgba(255, 255, 255, 0.6);
            --blur-light: blur(30px);
            --blur-medium: blur(40px);
            --blur-dark: blur(50px);
        }

        #app {
            width: 100%;
            height: 100vh;
            max-width: 375px;
            background: url('bg-flowers.jpg') center/cover no-repeat fixed;
            background-attachment: fixed;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #app::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" /></filter><rect width="100%" height="100%" fill="%23000" opacity="0.02" filter="url(%23noise)" /></svg>');
            background-size: 200px 200px;
            pointer-events: none;
            z-index: 1;
        }

        #app > * {
            position: relative;
            z-index: 2;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 2px;
        }

        /* ================================ PAGES ================================ */
        .page {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }

        .page.active {
            display: flex;
        }

        /* ================================ ONBOARDING ================================ */
        .onboarding-page {
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 24px;
            height: 100%;
            overflow-y: auto;
        }

        .onboarding-header {
            text-align: center;
            margin-bottom: 16px;
        }

        .onboarding-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .onboarding-subtitle {
            font-size: 13px;
            color: var(--text-tertiary);
            letter-spacing: 0.8px;
        }

        .card {
            background: var(--neutral-dark);
            backdrop-filter: var(--blur-medium);
            -webkit-backdrop-filter: var(--blur-medium);
            border: 1.5px solid var(--neutral-light);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            background: var(--neutral-dark);
            backdrop-filter: var(--blur-medium);
            -webkit-backdrop-filter: var(--blur-medium);
            border: 1.5px solid var(--neutral-light);
            border-radius: 20px;
            font-size: 14px;
            color: var(--text-primary);
            font-family: inherit;
            transition: all 0.3s;
        }

        .input-field:focus {
            outline: none;
            background: var(--neutral-medium);
            border-color: rgba(255, 255, 255, 0.35);
        }

        .skin-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .skin-btn {
            padding: 16px 12px;
            background: var(--neutral-dark);
            backdrop-filter: var(--blur-medium);
            -webkit-backdrop-filter: var(--blur-medium);
            border: 1.5px solid var(--neutral-light);
            border-radius: 20px;
            color: var(--text-tertiary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .skin-btn:hover {
            background: var(--neutral-medium);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .skin-btn.active {
            background: var(--primary-green);
            border-color: var(--primary-green-dark);
            color: var(--text-primary);
            box-shadow: 0 8px 32px rgba(110, 220, 160, 0.2);
        }

        .input-label {
            font-size: 12px;
            color: var(--text-tertiary);
            text-transform: lowercase;
            letter-spacing: 0.8px;
            margin-bottom: 12px;
            display: block;
            font-weight: 500;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ================================ ROUTINE DAYS ================================ */
        .days-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex: 1;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        .day-card {
            background: var(--neutral-dark);
            backdrop-filter: var(--blur-medium);
            -webkit-backdrop-filter: var(--blur-medium);
            border: 1.5px solid var(--neutral-light);
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .day-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .day-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--secondary-blue);
            border: 1px solid var(--secondary-blue-border);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .btn-small:hover {
            background: rgba(120, 170, 255, 0.3);
            border-color: var(--secondary-blue-dark);
        }

        .period-section {
            margin-bottom: 12px;
        }

        .period-label {
            font-size: 11px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .steps-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        .step-input {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .step-num {
            font-size: 11px;
            min-width: 20px;
            color: var(--text-tertiary);
            font-weight: 600;
        }

        .step-field {
            flex: 1;
            padding: 10px 12px;
            background: var(--neutral-dark);
            backdrop-filter: var(--blur-light);
            -webkit-backdrop-filter: var(--blur-light);
            border: 1.2px solid var(--neutral-light);
            border-radius: 16px;
            font-size: 13px;
            color: var(--text-primary);
            font-family: inherit;
        }

        .step-field:focus {
            outline: none;
            background: var(--neutral-medium);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-remove {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 100, 100, 0.2);
            border: 1px solid rgba(255, 100, 100, 0.4);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-add {
            width: 100%;
            padding: 10px;
            background: var(--primary-green);
            border: 1.2px solid var(--primary-green-border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
        }

        .btn-add:hover {
            background: rgba(110, 220, 160, 0.3);
        }

        /* ================================ BUTTONS ================================ */
        .btn {
            padding: 13px 24px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: inherit;
            transition: all 0.3s;
        }

        .btn--primary {
            background: var(--primary-green);
            border: 1.5px solid var(--primary-green-border);
            color: var(--text-primary);
        }

        .btn--primary:hover {
            background: rgba(110, 220, 160, 0.3);
            border-color: var(--primary-green-dark);
        }

        .btn--secondary {
            background: var(--neutral-dark);
            border: 1.2px solid var(--neutral-light);
            color: var(--text-secondary);
        }

        .btn--secondary:hover {
            background: var(--neutral-medium);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn--accent {
            background: var(--secondary-blue);
            border: 1.5px solid var(--secondary-blue-border);
            color: var(--text-primary);
            width: 100%;
        }

        .btn--accent:hover {
            background: rgba(120, 170, 255, 0.3);
            border-color: var(--secondary-blue-dark);
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .btn-group button {
            flex: 1;
        }

        /* ================================ FOOTER ================================ */
        .footer {
            padding: 16px 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            gap: 12px;
        }

        .slider-continuar {
            flex: 1;
            padding: 14px;
            background: var(--primary-green);
            border: 1.5px solid var(--primary-green-border);
            border-radius: 20px;
            color: var(--text-primary);
            font-weight: 600;
            cursor: grab;
            user-select: none;
            text-align: center;
            transition: all 0.3s;
        }

        .slider-continuar:hover {
            background: rgba(110, 220, 160, 0.3);
            border-color: var(--primary-green-dark);
        }

        /* ================================ DASHBOARD ================================ */
        .dashboard-header {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .dashboard-date {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 0 24px;
            margin: 16px 0;
        }

        .tab {
            padding: 10px;
            background: var(--neutral-dark);
            border: 1.5px solid var(--neutral-light);
            border-radius: 20px;
            color: var(--text-tertiary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            text-align: center;
        }

        .tab.active {
            background: var(--neutral-medium);
            border-color: rgba(255, 255, 255, 0.35);
            color: var(--text-primary);
        }

        .dashboard-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 24px 24px;
        }

        .view {
            display: none;
        }

        .view.active {
            display: flex;
            flex-direction: column;
        }

        .empty-state {
            color: var(--text-muted);
            font-size: 12px;
            padding: 20px;
            text-align: center;
        }

        .routine-widget {
            background: var(--neutral-dark);
            backdrop-filter: var(--blur-medium);
            -webkit-backdrop-filter: var(--blur-medium);
            border: 1.5px solid var(--neutral-light);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 14px;
        }

        .routine-step {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-primary);
            padding: 8px 0;
        }

        .step-circle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        /* ================================ MODAL ================================ */
        .modal {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 375px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px 24px 0 0;
            height: 80vh;
            z-index: 100;
            flex-direction: column;
            overflow: hidden;
        }

        .modal.active {
            display: flex;
        }

        .modal-header {
            padding: 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.9);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.1);
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: rgba(0, 0, 0, 0.6);
        }

        .modal-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-message {
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.5;
        }

        .chat-message.user {
            background: rgba(110, 220, 160, 0.2);
            color: rgba(0, 0, 0, 0.9);
            align-self: flex-end;
            max-width: 80%;
        }

        .chat-message.ai {
            background: rgba(200, 200, 200, 0.2);
            color: rgba(0, 0, 0, 0.8);
            align-self: flex-start;
            max-width: 95%;
        }

        .modal-input {
            padding: 12px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 8px;
        }

        .modal-input input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            font-size: 13px;
            font-family: inherit;
        }

        .modal-input button {
            padding: 10px 16px;
            background: rgba(110, 220, 160, 0.3);
            border: 1px solid rgba(110, 220, 160, 0.5);
            border-radius: 20px;
            color: rgba(0, 0, 0, 0.8);
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- PAGE 1: ONBOARDING PASO 1 -->
        <div id="onboardingStep1" class="page active">
            <div class="onboarding-page">
                <div class="onboarding-header">
                    <div class="onboarding-title">SkinCycle</div>
                    <div class="onboarding-subtitle">Vamos a empezar</div>
                </div>

                <div class="card">
                    <label class="input-label">¿Cuál es tu nombre?</label>
                    <input type="text" class="input-field" id="nameInput" placeholder="tu nombre" maxlength="30" onkeypress="if(event.key==='Enter') Onboarding.nextFromStep1()">
                </div>

                <div class="card">
                    <label class="input-label">¿Qué tipo de piel tienes?</label>
                    <div class="skin-buttons">
                        <button class="skin-btn" onclick="Onboarding.setSkinType('Seca')">Seca</button>
                        <button class="skin-btn" onclick="Onboarding.setSkinType('Grasa')">Grasa</button>
                        <button class="skin-btn" onclick="Onboarding.setSkinType('Mixta')">Mixta</button>
                        <button class="skin-btn" onclick="Onboarding.setSkinType('Sensible')">Sensible</button>
                    </div>
                </div>
            </div>

            <div class="footer">
                <button class="btn btn--primary" onclick="Onboarding.nextFromStep1()" style="flex:1;">siguiente →</button>
            </div>
        </div>

        <!-- PAGE 2: ONBOARDING PASO 2 -->
        <div id="onboardingStep2" class="page">
            <div class="onboarding-page">
                <div class="onboarding-header">
                    <div class="onboarding-title">Armemos tu rutina</div>
                    <div class="onboarding-subtitle">Agrega los pasos para cada día</div>
                </div>

                <div class="days-container" id="daysContainer"></div>

                <div class="card">
                    <button class="btn btn--accent" onclick="Chat.open()">💬 ¿Necesitas ayuda?</button>
                    <div style="margin-top: 8px; font-size: 11px; color: var(--text-tertiary); text-align: center;">
                        Habla con la IA si no sabes qué productos usar
                    </div>
                </div>
            </div>

            <div class="footer">
                <button class="btn btn--secondary" onclick="Onboarding.backToStep1()" style="flex:1;">← atrás</button>
                <div class="slider-continuar" draggable="true" onclick="Onboarding.completeOnboarding()" ondragend="Onboarding.completeOnboarding()">
                    continuar →
                </div>
            </div>
        </div>

        <!-- PAGE 3: DASHBOARD -->
        <div id="dashboard" class="page">
            <div class="dashboard-header">
                <div>
                    <div class="dashboard-title">SkinCycle</div>
                    <div class="dashboard-date" id="dashDate"></div>
                </div>
                <button class="btn btn--secondary" onclick="UI.editRoutine()" style="padding: 10px 14px;">✏️</button>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="Dashboard.switchTab('daily', event)">hoy</button>
                <button class="tab" onclick="Dashboard.switchTab('calendar', event)">tracker</button>
                <button class="tab" onclick="Dashboard.switchTab('routine', event)">rutina</button>
            </div>

            <div class="dashboard-content">
                <div id="daily" class="view active">
                    <div class="routine-widget">
                        <div style="font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px;" id="ampmTitle">AM ☀️</div>
                        <div id="dailySteps"></div>
                        <button class="btn btn--primary" onclick="Dashboard.toggleComplete()" style="width:100%; margin-top: 12px;">marcar como completada</button>
                    </div>

                    <div class="routine-widget">
                        <div style="font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px;" id="pmTitle">PM 🌙</div>
                        <div id="pmSteps"></div>
                    </div>

                    <button class="btn btn--accent" onclick="Chat.open()">💬 obtener recomendaciones</button>
                </div>

                <div id="calendar" class="view">
                    <div style="color: var(--text-muted);">Calendar view</div>
                </div>

                <div id="routine" class="view">
                    <div style="color: var(--text-muted);">Routine view</div>
                </div>
            </div>
        </div>
    </div>

    <!-- CHAT MODAL -->
    <div id="chatModal" class="modal">
        <div class="modal-header">
            <div class="modal-title">💭 IA Skincare</div>
            <button class="modal-close" onclick="Chat.close()">✕</button>
        </div>
        <div class="modal-content" id="chatContent"></div>
        <div class="modal-input">
            <input type="text" id="userInput" placeholder="describe tu problema..." onkeypress="if(event.key==='Enter') Chat.send()">
            <button onclick="Chat.send()">→</button>
        </div>
    </div>

    <script>
        const CONFIG = {
            HF_TOKEN: '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',
            HF_MODEL: 'mistralai/Mistral-7B-Instruct-v0.1',
            HF_API: 'https://api-inference.huggingface.co/models',
            DAYS: 3,
            PERIODS: ['AM', 'PM'],
            STORAGE_KEYS: {
                ROUTINE: 'skinCycleRoutine',
                COMPLETED: 'skinCycleCompleted'
            }
        };

        const State = {
            routine: {},
            completed: {},

            init() {
                const saved = localStorage.getItem(CONFIG.STORAGE_KEYS.ROUTINE);
                if (saved) {
                    this.routine = JSON.parse(saved);
                    UI.showPage('dashboard');
                } else {
                    this.routine = {
                        name: '',
                        skinType: '',
                        days: {}
                    };
                    this.initDays();
                }

                const completedSaved = localStorage.getItem(CONFIG.STORAGE_KEYS.COMPLETED);
                this.completed = completedSaved ? JSON.parse(completedSaved) : {};
            },

            initDays() {
                for (let i = 1; i <= CONFIG.DAYS; i++) {
                    this.routine.days[`day${i}`] = { AM: [], PM: [] };
                }
            },

            save() {
                localStorage.setItem(CONFIG.STORAGE_KEYS.ROUTINE, JSON.stringify(this.routine));
                localStorage.setItem(CONFIG.STORAGE_KEYS.COMPLETED, JSON.stringify(this.completed));
            }
        };

        const UI = {
            showPage(pageId) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(pageId).classList.add('active');
                if (pageId === 'dashboard') Dashboard.init();
            },

            editRoutine() {
                UI.showPage('onboardingStep2');
                Onboarding.renderRoutineStep();
            }
        };

        const Onboarding = {
            setSkinType(type) {
                State.routine.skinType = type;
                document.querySelectorAll('.skin-btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
            },

            nextFromStep1() {
                const name = document.getElementById('nameInput').value.trim();
                if (!name) {
                    alert('Por favor ingresa tu nombre');
                    return;
                }
                if (!State.routine.skinType) {
                    alert('Por favor selecciona tu tipo de piel');
                    return;
                }
                State.routine.name = name;
                UI.showPage('onboardingStep2');
                this.renderRoutineStep();
            },

            backToStep1() {
                UI.showPage('onboardingStep1');
            },

            renderRoutineStep() {
                const container = document.getElementById('daysContainer');
                container.innerHTML = '';

                const dayCount = Object.keys(State.routine.days).length;
                for (let i = 1; i <= dayCount; i++) {
                    const dayKey = `day${i}`;
                    const dayData = State.routine.days[dayKey];
                    container.appendChild(this.createDayCard(dayKey, i, dayData));
                }

                const addBtn = document.createElement('button');
                addBtn.className = 'btn btn--secondary';
                addBtn.textContent = '+ agregar otro día';
                addBtn.style.width = '100%';
                addBtn.onclick = () => {
                    const newDay = Object.keys(State.routine.days).length + 1;
                    State.routine.days[`day${newDay}`] = { AM: [], PM: [] };
                    this.renderRoutineStep();
                };
                container.appendChild(addBtn);
            },

            createDayCard(dayKey, dayNum, dayData) {
                const card = document.createElement('div');
                card.className = 'day-card';

                card.innerHTML = `
                    <div class="day-header">
                        <div class="day-title">Día ${dayNum}</div>
                        <div class="day-actions">
                            <button class="btn-small" onclick="Onboarding.duplicateDay('${dayKey}')" title="Duplicar">📋</button>
                            ${dayNum > 1 ? `<button class="btn-small" onclick="Onboarding.removeDay('${dayKey}')" title="Eliminar" style="background: rgba(255,100,100,0.2);">✕</button>` : ''}
                        </div>
                    </div>
                `;

                ['AM', 'PM'].forEach(period => {
                    const periodDiv = document.createElement('div');
                    periodDiv.className = 'period-section';
                    
                    const label = document.createElement('div');
                    label.className = 'period-label';
                    label.textContent = period;
                    periodDiv.appendChild(label);

                    const stepsList = document.createElement('div');
                    stepsList.className = 'steps-list';

                    (dayData[period] || []).forEach((step, idx) => {
                        const stepEl = document.createElement('div');
                        stepEl.className = 'step-input';
                        stepEl.innerHTML = `
                            <span class="step-num">0${idx + 1}</span>
                            <input type="text" class="step-field" value="${step}" onchange="Onboarding.updateStep('${dayKey}', '${period}', ${idx}, this.value)" placeholder="paso ${idx + 1}">
                            <button class="btn-remove" onclick="Onboarding.removeStep('${dayKey}', '${period}', ${idx})">×</button>
                        `;
                        stepsList.appendChild(stepEl);
                    });

                    periodDiv.appendChild(stepsList);

                    const addBtn = document.createElement('button');
                    addBtn.className = 'btn-add';
                    addBtn.textContent = '+ agregar paso';
                    addBtn.onclick = () => {
                        State.routine.days[dayKey][period].push('');
                        this.renderRoutineStep();
                    };
                    periodDiv.appendChild(addBtn);

                    card.appendChild(periodDiv);
                });

                return card;
            },

            updateStep(dayKey, period, idx, value) {
                State.routine.days[dayKey][period][idx] = value;
            },

            removeStep(dayKey, period, idx) {
                State.routine.days[dayKey][period].splice(idx, 1);
                this.renderRoutineStep();
            },

            duplicateDay(dayKey) {
                const dayNum = parseInt(dayKey.replace('day', ''));
                const newDay = Object.keys(State.routine.days).length + 1;
                State.routine.days[`day${newDay}`] = JSON.parse(JSON.stringify(State.routine.days[dayKey]));
                this.renderRoutineStep();
            },

            removeDay(dayKey) {
                delete State.routine.days[dayKey];
                const keys = Object.keys(State.routine.days).sort();
                const newDays = {};
                keys.forEach((key, idx) => {
                    newDays[`day${idx + 1}`] = State.routine.days[key];
                });
                State.routine.days = newDays;
                this.renderRoutineStep();
            },

            completeOnboarding() {
                State.save();
                UI.showPage('dashboard');
            }
        };

        const Dashboard = {
            init() {
                document.getElementById('dashDate').textContent = new Date().toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short' });
                this.renderDaily();
            },

            switchTab(tabName, event) {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.getElementById(tabName).classList.add('active');
                event.target.classList.add('active');
            },

            renderDaily() {
                const hour = new Date().getHours();
                const isAM = hour < 17;
                const day1 = State.routine.days.day1 || {};

                document.getElementById('ampmTitle').textContent = isAM ? 'AM ☀️' : 'PM 🌙';
                document.getElementById('pmTitle').textContent = isAM ? 'PM 🌙' : 'AM ☀️';

                const mainSteps = day1[isAM ? 'AM' : 'PM'] || [];
                const otherSteps = day1[isAM ? 'PM' : 'AM'] || [];

                const renderSteps = (containerId, steps) => {
                    const container = document.getElementById(containerId);
                    container.innerHTML = '';
                    if (steps.length === 0) {
                        container.innerHTML = '<div class="empty-state">sin pasos</div>';
                        return;
                    }
                    steps.forEach((step, i) => {
                        const stepEl = document.createElement('div');
                        stepEl.className = 'routine-step';
                        stepEl.innerHTML = `<div class="step-circle">${String(i + 1).padStart(2, '0')}</div><span>${step}</span>`;
                        container.appendChild(stepEl);
                    });
                };

                renderSteps('dailySteps', mainSteps);
                renderSteps('pmSteps', otherSteps);
            },

            toggleComplete() {
                const today = new Date().toISOString().split('T')[0];
                State.completed[today] = !State.completed[today];
                State.save();
            }
        };

        const Chat = {
            open() {
                document.getElementById('chatModal').classList.add('active');
            },

            close() {
                document.getElementById('chatModal').classList.remove('active');
            },

            async send() {
                const input = document.getElementById('userInput');
                const message = input.value.trim();
                
                if (!message) return;

                const content = document.getElementById('chatContent');
                const msgEl = document.createElement('div');
                msgEl.className = 'chat-message user';
                msgEl.textContent = message;
                content.appendChild(msgEl);
                input.value = '';
                content.scrollTop = content.scrollHeight;

                const loadingEl = document.createElement('div');
                loadingEl.className = 'chat-message ai';
                loadingEl.textContent = '⏳ Consultando...';
                content.appendChild(loadingEl);
                content.scrollTop = content.scrollHeight;

                try {
                    const response = await fetch(`${CONFIG.HF_API}/${CONFIG.HF_MODEL}`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${CONFIG.HF_TOKEN}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            inputs: `Eres experto en skincare K-beauty. El usuario tiene piel ${State.routine.skinType}. Responde: ${message}`
                        })
                    });

                    const data = await response.json();
                    const aiMessage = data[0]?.generated_text || 'No pude procesar tu mensaje';
                    
                    loadingEl.textContent = aiMessage;
                } catch (error) {
                    loadingEl.textContent = `❌ Error: ${error.message}`;
                }
            }
        };

        window.addEventListener('load', () => {
            State.init();
        });
    </script>
</body>
</html>
