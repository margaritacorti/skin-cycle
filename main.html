<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6b8ba8">
    <title>SkinCycle</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #5a7a8c 0%, #7a9aac 40%, #8fa8bc 100%);
            background-attachment: fixed;
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #app {
            width: 100%;
            height: 100vh;
            max-width: 375px;
            background: linear-gradient(135deg, #5a7a8c 0%, #7a9aac 40%, #8fa8bc 100%);
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            padding: 16px;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-left {
            flex: 1;
        }

        .header-title {
            font-size: 22px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
        }

        .header-date {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: lowercase;
            letter-spacing: 0.8px;
        }

        .nav-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 1.2px solid rgba(255, 255, 255, 0.25);
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.35);
        }

        /* TABS */
        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        .tab {
            padding: 10px;
            background: rgba(255, 255, 255, 0.12);
            border: 1.2px solid rgba(255, 255, 255, 0.22);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.65);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            text-align: center;
        }

        .tab.active {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.35);
            color: rgba(255, 255, 255, 0.95);
        }

        /* CONTENT */
        .content {
            flex: 1;
            overflow-y: auto;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        /* DAILY VIEW */
        .routine-widget {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(28px);
            border: 1.2px solid rgba(255, 255, 255, 0.22);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 14px;
        }

        .routine-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .routine-title {
            font-size: 18px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
        }

        .routine-badge {
            font-size: 12px;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.75);
        }

        .routine-steps {
            display: flex;
            flex-direction: column;
            gap: 0;
            margin-bottom: 8px;
        }

        .routine-step {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .routine-step:last-child {
            border-bottom: none;
        }

        .step-num {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.85);
            flex-shrink: 0;
        }

        .btn-complete {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.15);
            border: 1.2px solid rgba(255, 255, 255, 0.28);
            border-radius: 14px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-complete:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.35);
        }

        .btn-complete.done {
            background: rgba(120, 200, 150, 0.35);
            border-color: rgba(120, 200, 150, 0.6);
            color: rgba(255, 255, 255, 0.95);
            font-weight: 600;
        }

        /* CALENDAR */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 12px;
        }

        .day-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.12);
            border: 1.2px solid rgba(255, 255, 255, 0.22);
            font-size: 11px;
            color: rgba(255, 255, 255, 0.75);
            cursor: pointer;
            transition: all 0.3s;
        }

        .day-item:hover {
            background: rgba(255, 255, 255, 0.16);
        }

        .day-item.today {
            border: 1.5px solid rgba(255, 255, 255, 0.35);
        }

        .day-item.completed {
            background: rgba(120, 200, 150, 0.35);
            border-color: rgba(120, 200, 150, 0.55);
            color: rgba(255, 255, 255, 0.95);
            font-weight: 600;
        }

        /* FULL ROUTINE VIEW */
        .section-title {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: lowercase;
            letter-spacing: 1px;
            margin: 12px 0 10px 0;
            font-weight: 500;
        }

        .day-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1.2px solid rgba(255, 255, 255, 0.22);
            border-radius: 18px;
            padding: 14px;
            margin-bottom: 10px;
        }

        .day-name {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 10px;
        }

        .period-content {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .period-content:last-child {
            margin-bottom: 0;
        }

        .period-title {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-top: 8px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        /* AI CHAT BUTTON */
        .ai-button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            background: rgba(100, 150, 255, 0.3);
            border: 1.5px solid rgba(100, 150, 255, 0.55);
            border-radius: 14px;
            color: rgba(255, 255, 255, 0.95);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .ai-button:hover {
            background: rgba(100, 150, 255, 0.42);
            border-color: rgba(100, 150, 255, 0.75);
        }

        /* PROFILE SECTION */
        .profile-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1.2px solid rgba(255, 255, 255, 0.22);
            border-radius: 18px;
            padding: 14px;
            margin-bottom: 10px;
        }

        .profile-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .profile-item:last-child {
            margin-bottom: 0;
        }

        .profile-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: lowercase;
        }

        .profile-value {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }

        .btn-edit-routine {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.12);
            border: 1.2px solid rgba(255, 255, 255, 0.28);
            border-radius: 14px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-edit-routine:hover {
            background: rgba(255, 255, 255, 0.17);
            border-color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- HEADER -->
        <div class="header">
            <div class="header-left">
                <div class="header-title">SkinCycle</div>
                <div class="header-date" id="headerDate"></div>
            </div>
            <button class="nav-btn" onclick="window.location.href='index.html'">✏️</button>
        </div>

        <!-- TABS -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('daily')">hoy</button>
            <button class="tab" onclick="switchTab('calendar')">tracker</button>
            <button class="tab" onclick="switchTab('routine')">rutina</button>
        </div>

        <!-- CONTENT -->
        <div class="content">
            <!-- DAILY VIEW -->
            <div id="daily" class="view active">
                <div class="routine-widget">
                    <div class="routine-header">
                        <div class="routine-title" id="ampmTitle">AM</div>
                        <div class="routine-badge" id="ampmBadge">☀️</div>
                    </div>
                    <div class="routine-steps" id="dailySteps"></div>
                    <button class="btn-complete" id="completeBtn">marcar como completada</button>
                </div>

                <div class="routine-widget">
                    <div class="routine-header">
                        <div class="routine-title" id="otherPeriodTitle">PM</div>
                        <div class="routine-badge" id="otherBadge">🌙</div>
                    </div>
                    <div class="routine-steps" id="otherSteps"></div>
                </div>

                <button class="ai-button" onclick="goToChat()">💬 hablar con IA</button>
            </div>

            <!-- CALENDAR VIEW -->
            <div id="calendar" class="view">
                <div class="calendar-grid" id="calendarGrid"></div>
                <div class="section-title">detalles</div>
                <div class="profile-card">
                    <div class="profile-item">
                        <span class="profile-label">días completados</span>
                        <span class="profile-value" id="completedCount">0</span>
                    </div>
                    <div class="profile-item">
                        <span class="profile-label">racha actual</span>
                        <span class="profile-value" id="streakCount">0</span>
                    </div>
                </div>
            </div>

            <!-- ROUTINE VIEW -->
            <div id="routine" class="view">
                <div id="routineContent"></div>
                <div class="profile-card">
                    <div class="profile-item">
                        <span class="profile-label">tu nombre</span>
                        <span class="profile-value" id="profileName">—</span>
                    </div>
                    <div class="profile-item">
                        <span class="profile-label">tipo de piel</span>
                        <span class="profile-value" id="profileSkinType">—</span>
                    </div>
                </div>
                <button class="btn-edit-routine" onclick="window.location.href='index.html'">editar rutina</button>
            </div>
        </div>
    </div>

    <!-- CHAT MODAL -->
    <div id="chatModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3);z-index:1000;backdrop-filter:blur(4px);">
        <div style="position:absolute;bottom:0;left:0;right:0;max-width:375px;margin:auto;height:80vh;background:linear-gradient(135deg,#5a7a8c,#7a9aac,#8fa8bc);display:flex;flex-direction:column;border-radius:24px 24px 0 0;">
            <div style="padding:16px;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between;align-items:center;">
                <div style="font-size:16px;font-weight:600;color:rgba(255,255,255,0.9);">IA Assistant</div>
                <button onclick="closeChat()" style="width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.8);cursor:pointer;font-size:14px;">×</button>
            </div>
            <div id="chatMessages" style="flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;"></div>
            <div style="padding:12px;border-top:1px solid rgba(255,255,255,0.1);display:flex;gap:8px;">
                <input type="text" id="chatInput" placeholder="pregunta sobre productos..." style="flex:1;padding:10px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.28);border-radius:14px;color:rgba(255,255,255,0.9);font-family:'Helvetica Neue';">
                <button onclick="sendMessage()" style="width:36px;height:36px;border-radius:50%;background:rgba(100,150,255,0.35);border:1px solid rgba(100,150,255,0.55);color:rgba(255,255,255,0.95);cursor:pointer;font-size:14px;font-weight:600;">→</button>
            </div>
        </div>
    </div>

    <script>
        let routine = {};
        let completed = {};

        function init() {
            routine = JSON.parse(localStorage.getItem('skinCycleRoutine')) || {};
            completed = JSON.parse(localStorage.getItem('skinCycleCompleted')) || {};

            const dateOpts = { weekday: 'short', day: 'numeric', month: 'short' };
            const today = new Date().toLocaleDateString('es-ES', dateOpts);
            document.getElementById('headerDate').textContent = today;

            renderDaily();
            renderCalendar();
            renderRoutineView();
        }

        function renderDaily() {
            const hour = new Date().getHours();
            const isAM = hour < 17;
            const today = new Date().toISOString().split('T')[0];
            const isCompletedToday = completed[today];

            const currentPeriod = isAM ? 'AM' : 'PM';
            const otherPeriod = isAM ? 'PM' : 'AM';

            document.getElementById('ampmTitle').textContent = currentPeriod;
            document.getElementById('ampmBadge').textContent = isAM ? '☀️' : '🌙';
            document.getElementById('otherPeriodTitle').textContent = otherPeriod;
            document.getElementById('otherBadge').textContent = isAM ? '🌙' : '☀️';

            const currentDay = routine.days?.day1 || {};
            const currentSteps = currentDay[currentPeriod] || [];
            const currentEl = document.getElementById('dailySteps');
            currentEl.innerHTML = '';
            if (currentSteps.length === 0) {
                currentEl.innerHTML = '<div style="color:rgba(255,255,255,0.5);font-size:12px;padding:10px 0;">crea tu rutina en "tu rutina"</div>';
            } else {
                currentSteps.forEach((step, i) => {
                    const stepEl = document.createElement('div');
                    stepEl.className = 'routine-step';
                    stepEl.innerHTML = `
                        <div class="step-num">${String(i + 1).padStart(2, '0')}</div>
                        <span>${step}</span>
                    `;
                    currentEl.appendChild(stepEl);
                });
            }

            const otherSteps = currentDay[otherPeriod] || [];
            const otherEl = document.getElementById('otherSteps');
            otherEl.innerHTML = '';
            if (otherSteps.length === 0) {
                otherEl.innerHTML = '<div style="color:rgba(255,255,255,0.5);font-size:12px;padding:10px 0;">sin pasos aún</div>';
            } else {
                otherSteps.forEach((step, i) => {
                    const stepEl = document.createElement('div');
                    stepEl.className = 'routine-step';
                    stepEl.innerHTML = `
                        <div class="step-num">${String(i + 1).padStart(2, '0')}</div>
                        <span>${step}</span>
                    `;
                    otherEl.appendChild(stepEl);
                });
            }

            const completeBtn = document.getElementById('completeBtn');
            if (isCompletedToday) {
                completeBtn.classList.add('done');
                completeBtn.textContent = '✓ completada hoy';
            } else {
                completeBtn.classList.remove('done');
                completeBtn.textContent = 'marcar como completada';
            }
            completeBtn.onclick = () => {
                completed[today] = !completed[today];
                localStorage.setItem('skinCycleCompleted', JSON.stringify(completed));
                renderDaily();
            };
        }

        function renderCalendar() {
            const calendarEl = document.getElementById('calendarGrid');
            calendarEl.innerHTML = '';
            const today = new Date().toISOString().split('T')[0];

            for (let i = 6; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                const dayNum = date.getDate();
                const isToday = dateStr === today;
                const isDone = completed[dateStr];

                const dayEl = document.createElement('div');
                dayEl.className = 'day-item';
                if (isToday) dayEl.classList.add('today');
                if (isDone) dayEl.classList.add('completed');
                dayEl.textContent = dayNum;
                dayEl.onclick = () => {
                    completed[dateStr] = !completed[dateStr];
                    localStorage.setItem('skinCycleCompleted', JSON.stringify(completed));
                    renderCalendar();
                };
                calendarEl.appendChild(dayEl);
            }

            const totalDone = Object.values(completed).filter(Boolean).length;
            document.getElementById('completedCount').textContent = totalDone;

            let streak = 0;
            for (let i = 0; i < 365; i++) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const ds = d.toISOString().split('T')[0];
                if (completed[ds]) streak++;
                else break;
            }
            document.getElementById('streakCount').textContent = streak;
        }

        function renderRoutineView() {
            const content = document.getElementById('routineContent');
            content.innerHTML = '';

            document.getElementById('profileName').textContent = routine.name || '—';
            document.getElementById('profileSkinType').textContent = routine.skinType || '—';

            const days = routine.days || {};
            for (let i = 1; i <= 3; i++) {
                const dayKey = `day${i}`;
                const dayData = days[dayKey] || { AM: [], PM: [] };

                const dayCard = document.createElement('div');
                dayCard.className = 'day-card';
                dayCard.innerHTML = `<div class="day-name">día ${i}</div>`;

                ['AM', 'PM'].forEach(period => {
                    const steps = dayData[period] || [];
                    if (steps.length > 0) {
                        let html = `<div class="period-title">${period}</div>`;
                        steps.forEach((step, idx) => {
                            html += `<div class="period-content">0${idx + 1} ${step}</div>`;
                        });
                        dayCard.innerHTML += html;
                    }
                });

                content.appendChild(dayCard);
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        function goToChat() {
            document.getElementById('chatModal').style.display = 'block';
        }

        function closeChat() {
            document.getElementById('chatModal').style.display = 'none';
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;

            const messagesEl = document.getElementById('chatMessages');
            const userMsg = document.createElement('div');
            userMsg.style.cssText = 'background:rgba(100,150,255,0.25);padding:10px;border-radius:12px;color:rgba(255,255,255,0.95);font-size:12px;';
            userMsg.textContent = msg;
            messagesEl.appendChild(userMsg);

            input.value = '';
            messagesEl.scrollTop = messagesEl.scrollHeight;

            setTimeout(() => {
                const aiMsg = document.createElement('div');
                aiMsg.style.cssText = 'background:rgba(255,255,255,0.15);padding:10px;border-radius:12px;color:rgba(255,255,255,0.9);font-size:12px;';
                aiMsg.textContent = '💭 conectando con IA... (próximamente con Claude Cloud)';
                messagesEl.appendChild(aiMsg);
                messagesEl.scrollTop = messagesEl.scrollHeight;
            }, 500);
        }

        init();
    </script>
</body>
</html>
